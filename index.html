<!doctype html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOCUMENTOS_FAST</title>
  <style>
    @page{
      size: Letter;
      margin: 0;
    }

    body{
      margin:0;
      background:#f5f5f5;
      font-family: "Noto Sans", Arial, Helvetica, sans-serif;
      line-height:1.6;
      color:#222;
    }

    .hoja{
      width:21.59cm;
      min-height:27.94cm;
      margin:40px auto;
      background:#fff;
      padding:3.6cm 2cm 2.5cm;
      box-sizing:border-box;
      position:relative;
      overflow:hidden;
      border-radius:0;
      box-shadow:none;
    }

    .doc-header{
      position:absolute;
      top:1.2cm;
      left:2cm;
      right:2cm;
      margin:0;
      opacity:.78;
    }

    .header-top{
      display:flex;
      justify-content:flex-end;
      align-items:flex-start;
      margin-bottom:10px;
    }

    .logo{
      max-width:150px;
      height:auto;
      display:block;
    }

    .fecha{
      text-align:right;
      white-space:nowrap;
      font-size:8.64pt;
      color:#555;
      letter-spacing:.2px;
      font-style: italic;
      margin-bottom:10px;
    }

    .titulo{
      text-align:center;
      margin:50px 0 26px;
      padding:10px 14px;
      font-weight:400;
      font-size:15pt;
      text-decoration:underline;
    }

    .saludo{
      margin:10px 0 18px;
      font-weight:700;
      font-size:10.5pt;
    }

    .cuerpo{
      font-size:9.75pt;
    }

    .cuerpo p{
      margin:0 0 14px;
      text-align:justify;
    }

    .despedida{
      margin-top:24px;
      font-size:10.5pt;
      text-align:right;
    }

    .firma{
      margin-top: 46px;
      text-align:center;
    }

    .firma-img{
      max-width: 190px;
      height:auto;
      display:block;
      margin: 0 auto 6px;
    }

    .firma-nombre{
      font-weight:700;
      font-size:11.5px;
      margin-top:2px;
    }

    .firma-cargo{
      font-size:11px;
      margin-top:2px;
    }

    .nota{
      margin-left: -2cm;
      margin-right: -2cm;
      width: calc(100% + 4cm);
      box-sizing: border-box;
      margin-top: 18px;
      background: #f2f2f2;
      border-top: 1px solid #cfcfcf;
      border-bottom: 1px solid #cfcfcf;
      padding: 10px calc(2cm + 12px);
    }

    .nota small{
      display:block;
      margin:0;
      padding:0;
      border:0 !important;
      background:transparent !important;
      color:#333;
      font-size:8.25pt;
      line-height:1.4;
      text-align:justify;
    }

    .app-bar{
      max-width:780px;
      margin:40px auto 0;
      padding:0 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .brand{
      font-weight:800;
      letter-spacing:.2px;
      color:#111;
    }

    .panel{
      max-width:780px;
      margin:12px auto 0;
      background:#fff;
      border-radius:10px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      padding:20px 18px;
    }

    .tabs-cartas{
      display:flex;
      gap:10px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .tab-carta{
      border:1px solid #ddd;
      background:#f3f3f3;
      color:#222;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .tab-carta.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      align-items:start;
    }

    @media (max-width: 760px){
      .grid{ grid-template-columns: 1fr; }
    }

    .field-wrap{
      display:block;
    }

    .field-wrap.hidden-scope{
      display:none !important;
    }

    .field label{
      display:block;
      font-size:12px;
      color:#444;
      margin-bottom:6px;
      font-weight:700;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      box-sizing:border-box;
      border:1px solid #ddd;
      border-radius:8px;
      padding:7px 12px;
      font-size:14px;
      outline:none;
    }

    .field input[readonly]{
      background:#f5f5f5;
      color:#444;
      cursor:not-allowed;
    }

    .field-dias{
      grid-column: span 2;
    }

    .dias-picker{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap:8px;
    }

    .dia-btn{
      border:1px solid #d8d8d8;
      background:#f7f7f7;
      color:#222;
      padding:8px 0;
      border-radius:8px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }

    .dia-btn.activo{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    @media (max-width: 760px){
      .dias-picker{
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

    .mini-label{
      display:block;
      font-size:12px;
      color:#444;
      margin-bottom:6px;
      font-weight:700;
    }

    .creditos-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    @media (max-width: 760px){
      .creditos-grid{ grid-template-columns: 1fr; }
    }

    .creditos-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .creditos-header > label{
      font-size:12px;
      font-weight:700;
      color:#444;
    }

    .creditos-selector{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#555;
    }

    .creditos-selector select{
      width:auto;
      padding:4px 8px;
      font-size:12px;
      border-radius:6px;
    }

    .switch-rol{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .switch-rol-btn{
      border:1px solid #d0d0d0;
      background:#f3f3f3;
      color:#222;
      padding:10px 16px;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
    }

    .switch-rol-btn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:14px;
      grid-column:1 / -1;
    }

    button{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:#111;
      color:#fff;
    }

    .btn-ghost{
      background:#eee;
      color:#111;
    }

    .hint{
      font-size:12px;
      color:#666;
      margin:10px 0 0;
    }

    .hidden{
      display:none !important;
    }

    /* ===== AMONESTACIÓN ===== */
    .memo-wrap{
      font-size:10.5pt;
      color:#111;
    }

    .memo-codigo{
      text-align:center;
      font-weight:700;
      margin-top:10px;
      margin-bottom:34px;
    }

    .memo-fecha{
      text-align:right;
      margin-bottom:26px;
    }

    .memo-meta{
      margin-bottom:22px;
    }

    .memo-meta p{
      margin:0 0 8px;
    }

    .memo-cuerpo p{
      margin:0 0 16px;
      text-align:justify;
    }

    .memo-firma{
      margin-top:46px;
      text-align:center;
    }

    .firma-linea{
      width:280px;
      max-width:100%;
      border-top:1px solid #222;
      margin:0 auto 10px;
    }

    .firma-bloque div{
      line-height:1.4;
    }

    .memo-recepcion{
      margin-top:44px;
    }

    .memo-recepcion p{
      margin:0 0 10px;
    }

    @media print {
      body { background: #fff !important; }
      .app-bar, #panelFormulario { display: none !important; }
      #panelCarta { display: block !important; }
      .hoja {
        margin: 0 !important;
        box-shadow: none !important;
        width: 21.59cm !important;
        min-height: 27.94cm !important;
      }
    }
</style>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>

  <div class="app-bar">
      <div class="brand">DOCUMENTOS FAST</div>
      <div>
        <button class="btn-ghost" id="btnEditar" type="button">Editar datos</button>
        <button class="btn-primary hidden" id="btnImprimir" type="button">GUARDAR PDF</button>
      </div>
  </div>

  <section class="panel" id="panelFormulario">
    <div class="tabs-cartas" id="tabsCartas">
      <button class="tab-carta active" type="button" data-model="cdna">CARTA DE NO ADEUDO</button>
      <button class="tab-carta" type="button" data-model="amonestacion">AMONESTACIÓN</button>
    </div>

    <div class="modelo-form" id="formWrap_cdna" data-model="cdna">
      <form class="form-carta" data-model="cdna">
        <div class="grid">
          <div class="field-wrap" data-scope="all"><div class="field">
      <label for="cdna_DNI">DNI</label>
      <input id="cdna_DNI" type="text" value="" placeholder="Ingresa DNI">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="cdna_FECHA_HOY">Fecha de emisión</label>
          <input id="cdna_FECHA_HOY" type="date" value="">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="cdna_NOMBRE">Nombre completo</label>
      <input id="cdna_NOMBRE" type="text" value="" placeholder="Ingresa Nombre completo">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="cdna_FECHA_PAGO">Fecha de pago</label>
          <input id="cdna_FECHA_PAGO" type="date" value="">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="cdna_ENTIDAD">Entidad (banco / empresa)</label>
          <select id="cdna_ENTIDAD">
            <option value="">Selecciona una entidad...</option>
<option value="Caja Municipal de Ahorro y Crédito de Arequipa S.A.">Caja Municipal de Ahorro y Crédito de Arequipa S.A.</option>
<option value="Banco de la Nación">Banco de la Nación</option>
<option value="Banco BBVA Perú">Banco BBVA Perú</option>
<option value="Financiera Credinka S.A.">Financiera Credinka S.A.</option>
<option value="Caja Rural de Ahorro y Crédito del Centro S.A.">Caja Rural de Ahorro y Crédito del Centro S.A.</option>
<option value="Banco Internacional del Perú S.A.A. – Interbank">Banco Internacional del Perú S.A.A. – Interbank</option>
<option value="Caja Rural de Ahorro y Crédito Los Andes S.A.">Caja Rural de Ahorro y Crédito Los Andes S.A.</option>
<option value="Mibanco – Banco de la Microempresa S.A.">Mibanco – Banco de la Microempresa S.A.</option>
<option value="Financiera ProEmpresa S.A.">Financiera ProEmpresa S.A.</option>
<option value="Financiera Qaqap S.A.C.">Financiera Qaqap S.A.C.</option>
<option value="Caja Municipal de Ahorro y Crédito de Sullana S.A.">Caja Municipal de Ahorro y Crédito de Sullana S.A.</option>
<option value="Banco Scotiabank Perú S.A.A.">Banco Scotiabank Perú S.A.A.</option>
          </select>
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="cdna_FECHA_CASTIGO">Fecha de cesión / castigo</label>
          <input id="cdna_FECHA_CASTIGO" type="date" value="">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field field-creditos">
          <div class="creditos-header">
            <label>Créditos</label>

            <div class="creditos-selector">
              <span>Cantidad</span>
              <select id="cdna_CREDITOS_COUNT" data-model="cdna">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>
          </div>

          <div class="creditos-grid" id="cdna_CREDITOS_CONTAINER">
            <input id="cdna_CREDITOS_1" type="text" placeholder="Crédito 1">
            <input id="cdna_CREDITOS_2" type="text" placeholder="Crédito 2">
            <input id="cdna_CREDITOS_3" type="text" placeholder="Crédito 3">
            <input id="cdna_CREDITOS_4" type="text" placeholder="Crédito 4">
            <input id="cdna_CREDITOS_5" type="text" placeholder="Crédito 5">
          </div>
        </div></div>
<div class="field-wrap" data-scope="all">
          <div class="field" style="grid-column: span 2;">
            <label class="mini-label">JUDICIAL</label>
            <div style="display:flex; align-items:center; gap:10px;">
              <input id="cdna_JUDICIAL" type="checkbox" />
              <span style="font-size:13px; color:#444;">Activar expediente judicial</span>
            </div>
          </div>
        </div>

        <div class="field-wrap" data-scope="all">
          <div class="field hidden" id="cdna_EXPEDIENTE_FIELD" style="grid-column: span 2;">
            <label for="cdna_EXPEDIENTE">Nº de expediente</label>
            <input id="cdna_EXPEDIENTE" type="text" value="" placeholder="Ingresa Nº de expediente">
          </div>
        </div>
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit">GENERAR CARTA</button>
        </div>

        <p class="hint">Completa los campos y presiona <b>GENERAR CARTA</b> para ver la carta.</p>
      </form>
    </div>

<div class="modelo-form hidden" id="formWrap_amonestacion" data-model="amonestacion">
      <form class="form-carta" data-model="amonestacion">
        <div class="grid">
          <div class="field-wrap" data-scope="all"><div class="field">
          <label for="amonestacion_amonestado">Amonestado</label>
          <select id="amonestacion_amonestado">
            <option value="">Selecciona...</option>
          </select>
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="amonestacion_dni">DNI</label>
          <input id="amonestacion_dni" type="text" value="" readonly placeholder="DNI">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="amonestacion_cantidad">Cantidad</label>
          <input id="amonestacion_cantidad" type="text" value="" readonly placeholder="Se completa automáticamente">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="amonestacion_tipo">Tipo</label>
          <select id="amonestacion_tipo">
            <option value="">Selecciona...</option>
            <option value="TARDANZA">TARDANZA</option>
            <option value="FALTA">FALTA</option>
          </select>
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field field-dias" style="grid-column: span 2;">
          <label for="amonestacion_dias">Días</label>
          <input id="amonestacion_dias" type="text" value="" readonly placeholder="Selecciona uno o más días">
          <div class="dias-picker" id="amonestacion_dias_picker">
            <button type="button" class="dia-btn" data-value="01">1</button>
<button type="button" class="dia-btn" data-value="02">2</button>
<button type="button" class="dia-btn" data-value="03">3</button>
<button type="button" class="dia-btn" data-value="04">4</button>
<button type="button" class="dia-btn" data-value="05">5</button>
<button type="button" class="dia-btn" data-value="06">6</button>
<button type="button" class="dia-btn" data-value="07">7</button>
<button type="button" class="dia-btn" data-value="08">8</button>
<button type="button" class="dia-btn" data-value="09">9</button>
<button type="button" class="dia-btn" data-value="10">10</button>
<button type="button" class="dia-btn" data-value="11">11</button>
<button type="button" class="dia-btn" data-value="12">12</button>
<button type="button" class="dia-btn" data-value="13">13</button>
<button type="button" class="dia-btn" data-value="14">14</button>
<button type="button" class="dia-btn" data-value="15">15</button>
<button type="button" class="dia-btn" data-value="16">16</button>
<button type="button" class="dia-btn" data-value="17">17</button>
<button type="button" class="dia-btn" data-value="18">18</button>
<button type="button" class="dia-btn" data-value="19">19</button>
<button type="button" class="dia-btn" data-value="20">20</button>
<button type="button" class="dia-btn" data-value="21">21</button>
<button type="button" class="dia-btn" data-value="22">22</button>
<button type="button" class="dia-btn" data-value="23">23</button>
<button type="button" class="dia-btn" data-value="24">24</button>
<button type="button" class="dia-btn" data-value="25">25</button>
<button type="button" class="dia-btn" data-value="26">26</button>
<button type="button" class="dia-btn" data-value="27">27</button>
<button type="button" class="dia-btn" data-value="28">28</button>
<button type="button" class="dia-btn" data-value="29">29</button>
<button type="button" class="dia-btn" data-value="30">30</button>
<button type="button" class="dia-btn" data-value="31">31</button>
          </div>
        </div></div>
<div class="field-wrap" data-scope="supervisor"><div class="field">
      <label for="amonestacion_calculo">Cálculo del mes</label>
      <input id="amonestacion_calculo" type="text" value="" placeholder="Ingresa Cálculo del mes">
    </div></div>
<div class="field-wrap" data-scope="supervisor"><div class="field">
      <label for="amonestacion_tiempo">Tiempo acumulado</label>
      <input id="amonestacion_tiempo" type="text" value="" placeholder="Ingresa Tiempo acumulado">
    </div></div>
<div class="field-wrap" data-scope="asesor"><div class="field">
          <label for="amonestacion_super">Supervisor firmante</label>
          <input id="amonestacion_super" type="text" value="" readonly placeholder="Supervisor firmante">
        </div></div>
<div class="field-wrap" data-scope="all">
          <div class="field" style="grid-column: span 2;">
            <label class="mini-label">Tipo de destinatario</label>
            <div class="switch-rol" id="amonestacion_switch_rol">
              <button type="button" class="switch-rol-btn active" data-value="asesor" id="btnRolAsesor">
                ASESOR
              </button>
              <button type="button" class="switch-rol-btn" data-value="supervisor" id="btnRolSupervisor">
                SUPERVISOR
              </button>
            </div>
            <input id="amonestacion_rol_destinatario" type="hidden" value="asesor">
          </div>
        </div>
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit">GENERAR CARTA</button>
        </div>

        <p class="hint">Completa los campos y presiona <b>GENERAR CARTA</b> para ver la carta.</p>
      </form>
    </div>
  </section>

  <section id="panelCarta" class="hidden">
    <div id="renderCarta"></div>
  </section>

    const sel = document.getElementById('amonestacion_amonestado');

    const catalogo = getAmonestacionCatalogByRol();

    sel.innerHTML = '<option value="">Selecciona...</option>' +
      catalogo.map(p => `<option value="${p.nombre}">${p.nombre}</option>`).join('');

    const existeActual = catalogo.some(p => p.nombre === valorActual);
    sel.value = existeActual ? valorActual : '';

    const sel = document.getElementById('amonestacion_amonestado');
    const dni = document.getElementById('amonestacion_dni');
    const superInp = document.getElementById('amonestacion_super');
    if (!sel) return;

    const nombre = (sel.value || '').trim();

    const persona = catalogo.find(p => p.nombre === nombre);

    if (!persona) {
      if (dni) dni.value = '';
      if (superInp) superInp.value = '';

    if (dni) dni.value = persona.dni || '';
    if (superInp) superInp.value = persona.supervisor || '';

  function syncDiasButtonsFromInput() {

        .map(v => v.trim())
        .filter(Boolean)
    );

    const total = (diasInput.value || '')

      .map(v => v.trim())

    cantidadInput.value = total ? String(total) : '';
  }

  function toggleDiaSeleccion(value) {
    const input = document.getElementById('amonestacion_dias');
    if (!input) return;

    let valores = (input.value || '')
      .split(',')
      .map(v => v.trim())
      .filter(Boolean);

    if (valores.includes(value)) {
      valores = valores.filter(v => v !== value);
    } else {
      valores.push(value);
    }

    valores = [...new Set(valores)].sort((a, b) => Number(a) - Number(b));
    input.value = valores.join(', ');
    syncDiasButtonsFromInput();
    syncCantidadDesdeDias();
  }

  function syncCreditosInputs() {
    if (activeModel !== 'cdna') return;

    const creditosCount = document.getElementById('cdna_CREDITOS_COUNT');
    const creditosContainer = document.getElementById('cdna_CREDITOS_CONTAINER');
    if (!creditosCount || !creditosContainer) return;

    const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
    for (let i = 1; i <= 5; i++) {
      const inp = document.getElementById(`cdna_CREDITOS_${i}`);
      if (!inp) continue;
      const visible = i <= n;
      inp.classList.toggle('hidden', !visible);
      if (!visible) inp.value = '';
    }
  }

  function syncCdnaJudicialUI() {
    const chkJudicial = document.getElementById('cdna_JUDICIAL');
    const expedienteField = document.getElementById('cdna_EXPEDIENTE_FIELD');
    const expedienteInput = document.getElementById('cdna_EXPEDIENTE');

  function buildCreditosString() {
    const creditosCount = document.getElementById('cdna_CREDITOS_COUNT');
    if (!creditosCount) return '';

    const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
    const vals = [];

    for (let i = 1; i <= n; i++) {
      const v = (document.getElementById(`cdna_CREDITOS_${i}`)?.value || '').trim();
      if (v) vals.push(v);
    }

    return vals.join(', ');
  }

  function applySingularPluralByCreditos(text) {
    const n = Number(document.getElementById('cdna_CREDITOS_COUNT')?.value || 1);
    const isSingular = (n === 1);
    const reSing = /\{\{\s*singular\s*\}\}([\s\S]*?)\{\{\s*\/singular\s*\}\}/gi;
    const rePlur = /\{\{\s*plural\s*\}\}([\s\S]*?)\{\{\s*\/plural\s*\}\}/gi;

    if (isSingular) {
      text = text.replace(reSing, '$1');
      text = text.replace(rePlur, '');
    } else {
      text = text.replace(rePlur, '$1');
      text = text.replace(reSing, '');
    }

    return text;
  }

  function applyJudicialBlock(text) {
    const on = !!document.getElementById('cdna_JUDICIAL')?.checked;
    const reJud = /\{\{\s*judicial\s*\}\}([\s\S]*?)\{\{\s*\/judicial\s*\}\}/gi;
    return on ? text.replace(reJud, '$1') : text.replace(reJud, '');
  }

  function applyRolBlocks(text) {
    const rol = (document.getElementById('amonestacion_rol_destinatario')?.value || '').trim();
    const reAsesor = /\{\{\s*asesor\s*\}\}([\s\S]*?)\{\{\s*\/asesor\s*\}\}/gi;
    const reSupervisor = /\{\{\s*supervisor\s*\}\}([\s\S]*?)\{\{\s*\/supervisor\s*\}\}/gi;

    if (rol === 'asesor') {
      text = text.replace(reAsesor, '$1');
      text = text.replace(reSupervisor, '');
    } else if (rol === 'supervisor') {
      text = text.replace(reSupervisor, '$1');
      text = text.replace(reAsesor, '');
    } else {
      text = text.replace(reSupervisor, '');
      text = text.replace(reAsesor, '');
    }

    return text;
  }

  function applyTemplate(templateStr, data) {
    return templateStr.replace(/\{\{\s*([A-Za-z0-9_]+)\s*\}\}/g, (match, key) => {
      const v = data[key];
      return (v === undefined || v === null || v === '') ? match : String(v);
    });
  }

  function isoToLongEs(iso) {
    if (!iso) return '';
    const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return '';
    const yyyy = Number(m[1]);
    const mm = Number(m[2]);
    const dd = Number(m[3]);
    if (!yyyy || mm < 1 || mm > 12 || dd < 1 || dd > 31) return '';
    return `${dd} de ${MONTHS_ES[mm - 1]} de ${yyyy}`;
  }

  function collectData(modelId) {
    const cfg = MODELOS[modelId];

    for (const key of cfg.placeholders) {
      if (modelId === 'cdna' && key === 'CREDITOS') {
        data[key] = buildCreditosString();
        continue;
      }

      if (modelId === 'cdna' && key === 'EXPEDIENTE') {
        data[key] = (document.getElementById('cdna_EXPEDIENTE')?.value || '').trim();
        continue;
      }

      const el = document.getElementById(getFieldId(modelId, key));
      if (!el) continue;

      let v = (el.value || '').trim();

      if (cfg.date_keys.includes(key)) {
        v = isoToLongEs(v);
      }

      data[key] = v;
    }

    if (modelId === 'amonestacion') {
      const rol = (document.getElementById('amonestacion_rol_destinatario')?.value || 'asesor').trim();

      data.rol_destinatario = rol;
      data.ciudad = 'Lima';

      } else if (rol === 'supervisor') {
        data.cargo_amonestado = 'Supervisor de cobranza telefónica';
      }
    }

    return data;
  }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const modelId = form.dataset.model;
      const data = collectData(modelId);

      if (modelId === 'cdna' && ('FECHA_HOY' in data) && !data.FECHA_HOY) {
        const d = new Date();
        const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        data.FECHA_HOY = isoToLongEs(iso);
      }

      const tplRaw = document.getElementById(`tplCarta_${modelId}`).innerHTML;
      let tplFixed = tplRaw;

      if (modelId === 'cdna') {
        tplFixed = applySingularPluralByCreditos(tplFixed);
        tplFixed = applyJudicialBlock(tplFixed);
      }

      if (modelId === 'amonestacion') {
        tplFixed = applyRolBlocks(tplFixed);
      }

      renderCarta.innerHTML = applyTemplate(tplFixed, data);
      showCarta();
    });
  });

  btnImprimir?.addEventListener('click', () => {
    window.print();
  });

  setRolDestinatario('asesor');
  syncAmonestadoOptionsByRol();
  syncDiasButtonsFromInput();
  syncCantidadDesdeDias();
  switchModel('cdna');
</script>

</body>
</html>
