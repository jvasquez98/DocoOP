<!doctype html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOCUMENTOS_FAST</title>
  <style>
    @page{
      size: Letter;
      margin: 0;
    }

    body{
      margin:0;
      background:#f5f5f5;
      font-family: "Noto Sans", Arial, Helvetica, sans-serif;
      line-height:1.6;
      color:#222;
    }

    .hoja{
      width:21.59cm;
      min-height:27.94cm;
      margin:40px auto;
      background:#fff;
      padding:3.6cm 2cm 2.5cm;
      box-sizing:border-box;
      position:relative;
      overflow:hidden;
      border-radius:0;
      box-shadow:none;
    }

    .doc-header{
      position:absolute;
      top:1.2cm;
      left:2cm;
      right:2cm;
      margin:0;
      opacity:.78;
    }

    .header-top{
      display:flex;
      justify-content:flex-end;
      align-items:flex-start;
      margin-bottom:10px;
    }

    .logo{
      max-width:150px;
      height:auto;
      display:block;
    }

    .fecha{
      text-align:right;
      white-space:nowrap;
      font-size:8.64pt;
      color:#555;
      letter-spacing:.2px;
      font-style: italic;
      margin-bottom:10px;
    }

    .titulo{
      text-align:center;
      margin:50px 0 26px;
      padding:10px 14px;
      font-weight:400;
      font-size:15pt;
      text-decoration:underline;
    }

    .saludo{
      margin:10px 0 18px;
      font-weight:700;
      font-size:10.5pt;
    }

    .cuerpo{
      font-size:9.75pt;
    }

    .cuerpo p{
      margin:0 0 14px;
      text-align:justify;
    }

    .despedida{
      margin-top:24px;
      font-size:10.5pt;
      text-align:right;
    }

    .firma{
      margin-top: 46px;
      text-align:center;
    }

    .firma-img{
      max-width: 190px;
      height:auto;
      display:block;
      margin: 0 auto 6px;
    }

    .firma-nombre{
      font-weight:700;
      font-size:11.5px;
      margin-top:2px;
    }

    .firma-cargo{
      font-size:11px;
      margin-top:2px;
    }

    .nota{
      margin-left: -2cm;
      margin-right: -2cm;
      width: calc(100% + 4cm);
      box-sizing: border-box;
      margin-top: 18px;
      background: #f2f2f2;
      border-top: 1px solid #cfcfcf;
      border-bottom: 1px solid #cfcfcf;
      padding: 10px calc(2cm + 12px);
    }

    .nota small{
      display:block;
      margin:0;
      padding:0;
      border:0 !important;
      background:transparent !important;
      color:#333;
      font-size:8.25pt;
      line-height:1.4;
      text-align:justify;
    }

    .app-bar{
      max-width:780px;
      margin:40px auto 0;
      padding:0 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .brand{
      font-weight:800;
      letter-spacing:.2px;
      color:#111;
    }

    .panel{
      max-width:780px;
      margin:12px auto 0;
      background:#fff;
      border-radius:10px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      padding:20px 18px;
    }

    .tabs-cartas{
      display:flex;
      gap:10px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .tab-carta{
      border:1px solid #ddd;
      background:#f3f3f3;
      color:#222;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .tab-carta.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    @media (max-width: 760px){
      .grid{ grid-template-columns: 1fr; }
    }

    .field label{
      display:block;
      font-size:12px;
      color:#444;
      margin-bottom:6px;
      font-weight:700;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      box-sizing:border-box;
      border:1px solid #ddd;
      border-radius:8px;
      padding:7px 12px;
      font-size:14px;
      outline:none;
    }

    .mini-label{
      display:block;
      font-size:12px;
      color:#444;
      margin-bottom:6px;
      font-weight:700;
    }

    .creditos-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    @media (max-width: 760px){
      .creditos-grid{ grid-template-columns: 1fr; }
    }

    .creditos-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .creditos-header > label{
      font-size:12px;
      font-weight:700;
      color:#444;
    }

    .creditos-selector{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#555;
    }

    .creditos-selector select{
      width:auto;
      padding:4px 8px;
      font-size:12px;
      border-radius:6px;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:14px;
    }

    button{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:#111;
      color:#fff;
    }

    .btn-ghost{
      background:#eee;
      color:#111;
    }

    .hint{
      font-size:12px;
      color:#666;
      margin:10px 0 0;
    }

    .hidden{
      display:none !important;
    }

    /* ===== AMONESTACIÓN ===== */
    .memo-wrap{
      font-size:10.5pt;
      color:#111;
    }

    .memo-codigo{
      text-align:center;
      font-weight:700;
      margin-top:10px;
      margin-bottom:34px;
    }

    .memo-fecha{
      text-align:right;
      margin-bottom:26px;
    }

    .memo-meta{
      margin-bottom:22px;
    }

    .memo-meta p{
      margin:0 0 8px;
    }

    .memo-cuerpo p{
      margin:0 0 16px;
      text-align:justify;
    }

    .memo-firma{
      margin-top:46px;
      text-align:center;
    }

    .firma-linea{
      width:280px;
      max-width:100%;
      border-top:1px solid #222;
      margin:0 auto 10px;
    }

    .firma-bloque div{
      line-height:1.4;
    }

    .memo-recepcion{
      margin-top:44px;
    }

    .memo-recepcion p{
      margin:0 0 10px;
    }

    @media print {
      body { background: #fff !important; }
      .app-bar, #panelFormulario { display: none !important; }
      #panelCarta { display: block !important; }
      .hoja {
        margin: 0 !important;
        box-shadow: none !important;
        width: 21.59cm !important;
        min-height: 27.94cm !important;
      }
    }
</style>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

  </div>

          <div class="creditos-grid" id="CREDITOS_CONTAINER">

            <input id="CREDITOS_5" type="text" placeholder="Crédito 5">

        </div>
<div class="field">
      <label for="EXPEDIENTE">Nº de expediente</label>
      <input id="EXPEDIENTE" type="text" value="" placeholder="Ingresa Nº de expediente">

          <div class="field">
      <label for="numero">Número de memorando</label>
      <input id="numero" type="text" value="" placeholder="Ingresa Número de memorando">

  <section id="panelCarta" class="hidden">

<template id="tplCarta_amonestacion">

  <section class="memo-wrap">

    <div class="memo-fecha">{{ciudad}}, {{fecha_documento}}</div>

        Por los hechos dados, se le aplica una amonestación escrita y le invocamos a recapacitar sobre su actitud con el fin de mantener un buen desempeño de sus funciones dentro de la empresa. {{/supervisor}}

      </p>

      <p>
        Copia de esta comunicación va a su archivo personal para los efectos legales pertinentes.
      </p>

      <p>Atentamente,</p>

      <p>Firma:</p>
    </section>
  </section>
</main>

    </template>

<script>
  const MODELOS = {"cdna": {"id": "cdna", "nombre": "CARTA DE NO ADEUDO", "placeholders": ["DNI", "FECHA_HOY", "NOMBRE", "FECHA_PAGO", "ENTIDAD", "FECHA_CASTIGO", "CREDITOS", "EXPEDIENTE"], "labels": {"FECHA_HOY": "Fecha de emisión", "DNI": "DNI", "NOMBRE": "Nombre completo", "ENTIDAD": "Entidad (banco / empresa)", "FECHA_CASTIGO": "Fecha de cesión / castigo", "CREDITOS": "Créditos", "FECHA_PAGO": "Fecha de pago", "EXPEDIENTE": "Nº de expediente"}, "date_keys": ["FECHA_CASTIGO", "FECHA_HOY", "FECHA_PAGO"], "select_keys": ["ENTIDAD"], "textarea_keys": [], "defaults": {}}, "amonestacion": {"id": "amonestacion", "nombre": "AMONESTACIÓN", "placeholders": ["numero", "anio", "ciudad", "fecha_documento", "amonestado", "cargo_amonestado", "cantidad", "tipo", "dias", "calculo", "tiempo", "super"], "labels": {"numero": "Número de memorando", "anio": "Año", "ciudad": "Ciudad", "fecha_documento": "Fecha del documento", "amonestado": "Amonestado", "cargo_amonestado": "Cargo del amonestado", "rol_destinatario": "Tipo de destinatario", "cantidad": "Cantidad", "tipo": "Tipo", "dias": "Días", "calculo": "Cálculo del mes", "tiempo": "Tiempo acumulado", "super": "Supervisor firmante"}, "date_keys": [], "select_keys": ["rol_destinatario"], "textarea_keys": [], "defaults": {"anio": "2026", "ciudad": "Lima"}}};
  let activeModel = 'cdna';

  const panelFormulario = document.getElementById('panelFormulario');
  const panelCarta = document.getElementById('panelCarta');
  const renderCarta = document.getElementById('renderCarta');
  const btnEditar = document.getElementById('btnEditar');
  const btnImprimir = document.getElementById('btnImprimir');
  const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Setiembre','Octubre','Noviembre','Diciembre'];

  function showForm() {{
    panelFormulario.classList.remove('hidden');
    panelCarta.classList.add('hidden');
    btnImprimir?.classList.add('hidden');
    window.scrollTo({{ top: 0, behavior: 'smooth' }});
  }}

  function showCarta() {{
    panelFormulario.classList.add('hidden');
    panelCarta.classList.remove('hidden');
    btnImprimir?.classList.remove('hidden');
    window.scrollTo({{ top: 0, behavior: 'smooth' }});
  }}

  function switchModel(modelId) {{
    activeModel = modelId;

    document.querySelectorAll('.tab-carta').forEach(btn => {{
      btn.classList.toggle('active', btn.dataset.model === modelId);
    }});

    document.querySelectorAll('.modelo-form').forEach(box => {{
      box.classList.toggle('hidden', box.dataset.model !== modelId);
    }});

    syncCreditosInputs();
    syncCdnaJudicialUI();
  }}

  function syncCreditosInputs() {{
    if (activeModel !== 'cdna') return;
    const creditosCount = document.getElementById('CREDITOS_COUNT');
    const creditosContainer = document.getElementById('CREDITOS_CONTAINER');
    if (!creditosCount || !creditosContainer) return;

    const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
    for (let i = 1; i <= 5; i++) {{
      const inp = document.getElementById(`CREDITOS_${{i}}`);
      if (!inp) continue;
      const visible = i <= n;
      inp.classList.toggle('hidden', !visible);
      if (!visible) inp.value = '';
    }}
  }}

  function syncCdnaJudicialUI() {{
    const chkJudicial = document.getElementById('JUDICIAL');
    const expedienteField = document.getElementById('EXPEDIENTE_FIELD');
    const expedienteInput = document.getElementById('EXPEDIENTE');

    if (!chkJudicial || !expedienteField) return;

    const on = !!chkJudicial.checked;
    expedienteField.classList.toggle('hidden', !on);
    if (!on && expedienteInput) expedienteInput.value = '';
  }}

  function buildCreditosString() {{
    const creditosCount = document.getElementById('CREDITOS_COUNT');
    if (!creditosCount) return '';
    const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
    const vals = [];
    for (let i = 1; i <= n; i++) {{
      const v = (document.getElementById(`CREDITOS_${{i}}`)?.value || '').trim();
      if (v) vals.push(v);
    }}
    return vals.join(', ');
  }}

  function applySingularPluralByCreditos(text) {{
    const n = Number(document.getElementById('CREDITOS_COUNT')?.value || 1);
    const isSingular = (n === 1);
    const reSing = /\{\{\s*singular\s*\}\}([\s\S]*?)\{\{\s*\/singular\s*\}\}/gi;
    const rePlur = /\{\{\s*plural\s*\}\}([\s\S]*?)\{\{\s*\/plural\s*\}\}/gi;

    if (isSingular) {{
      text = text.replace(reSing, '$1');
      text = text.replace(rePlur, '');
    }} else {{
      text = text.replace(rePlur, '$1');
      text = text.replace(reSing, '');
    }}
    return text;
  }}

  function applyJudicialBlock(text) {{
    const on = !!document.getElementById('JUDICIAL')?.checked;
    const reJud = /\{\{\s*judicial\s*\}\}([\s\S]*?)\{\{\s*\/judicial\s*\}\}/gi;
    return on ? text.replace(reJud, '$1') : text.replace(reJud, '');
  }}

  function applyRolBlocks(text) {{
    const rol = (document.getElementById('rol_destinatario')?.value || '').trim();
    const reAsesor = /\{\{\s*asesor\s*\}\}([\s\S]*?)\{\{\s*\/asesor\s*\}\}/gi;
    const reSupervisor = /\{\{\s*supervisor\s*\}\}([\s\S]*?)\{\{\s*\/supervisor\s*\}\}/gi;

    if (rol === 'asesor') {{
      text = text.replace(reAsesor, '$1');
      text = text.replace(reSupervisor, '');
    }} else if (rol === 'supervisor') {{
      text = text.replace(reSupervisor, '$1');
      text = text.replace(reAsesor, '');
    }} else {{
      text = text.replace(reSupervisor, '');
      text = text.replace(reAsesor, '');
    }}

    return text;
  }}

  function applyTemplate(templateStr, data) {{
    return templateStr.replace(/\{\{\s*([A-Za-z0-9_]+)\s*\}\}/g, (match, key) => {{
      const v = data[key];
      return (v === undefined || v === null || v === '') ? match : String(v);
    }});
  }}

  function isoToLongEs(iso) {{
    if (!iso) return '';
    const m = String(iso).match(/^(\d{{4}})-(\d{{2}})-(\d{{2}})$/);
    if (!m) return '';
    const yyyy = Number(m[1]);
    const mm = Number(m[2]);
    const dd = Number(m[3]);
    if (!yyyy || mm < 1 || mm > 12 || dd < 1 || dd > 31) return '';
    return `${{dd}} de ${{MONTHS_ES[mm - 1]}} de ${{yyyy}}`;
  }}

  function collectData(modelId) {{
    const cfg = MODELOS[modelId];
    const data = {{}};

    for (const key of cfg.placeholders) {{
      if (modelId === 'cdna' && key === 'CREDITOS') {{
        data[key] = buildCreditosString();
        continue;
      }}

      const el = document.getElementById(key);
      if (!el) continue;

      let v = (el.value || '').trim();

      if (cfg.date_keys.includes(key)) {{
        v = isoToLongEs(v);
      }}

      data[key] = v;
    }}

    if (modelId === 'cdna') {{
      data.EXPEDIENTE = (document.getElementById('EXPEDIENTE')?.value || '').trim();
    }}

    return data;
  }}

  document.querySelectorAll('.tab-carta').forEach(btn => {{
    btn.addEventListener('click', () => switchModel(btn.dataset.model));
  }});

  btnEditar?.addEventListener('click', showForm);

  document.addEventListener('change', (e) => {{
    if (e.target?.id === 'CREDITOS_COUNT') syncCreditosInputs();
    if (e.target?.id === 'JUDICIAL') syncCdnaJudicialUI();
  }});

  document.querySelectorAll('.form-carta').forEach(form => {{
    form.addEventListener('submit', (e) => {{
      e.preventDefault();

      const modelId = form.dataset.model;
      const data = collectData(modelId);

      if (modelId === 'cdna' && ('FECHA_HOY' in data) && !data.FECHA_HOY) {{
        const d = new Date();
        const iso = `${{d.getFullYear()}}-${{String(d.getMonth()+1).padStart(2,'0')}}-${{String(d.getDate()).padStart(2,'0')}}`;
        data.FECHA_HOY = isoToLongEs(iso);
      }}

      const tplRaw = document.getElementById(`tplCarta_${{modelId}}`).innerHTML;
      let tplFixed = tplRaw;

      if (modelId === 'cdna') {{
        tplFixed = applySingularPluralByCreditos(tplFixed);
        tplFixed = applyJudicialBlock(tplFixed);
      }}

      if (modelId === 'amonestacion') {{
        tplFixed = applyRolBlocks(tplFixed);
      }}

      renderCarta.innerHTML = applyTemplate(tplFixed, data);
      showCarta();
    }});
  }});

  btnImprimir?.addEventListener('click', () => {{
    window.print();
  }});

  switchModel('cdna');
</script>

</body>
</html>
