<!doctype html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QUICK_DOC</title>
  <style>
    @page{
      size: Letter;
      margin: 0;
    }

    body{
      margin:0;
      background:#f5f5f5;
      font-family: "Noto Sans", Arial, Helvetica, sans-serif;
      line-height:1.6;
      color:#222;
    }

    .hoja{
      width:21.59cm;
      min-height:27.94cm;
      margin:40px auto;
      background:#fff;
      padding:3.6cm 2cm 2.5cm;
      box-sizing:border-box;
      position:relative;
      overflow:visible;;
      border-radius:0;
      box-shadow:none;
    }

    .doc-header{
      position:absolute;
      top:1.2cm;
      left:2cm;
      right:2cm;
      margin:0;
    }

    .header-top.dual-logo{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      width:100%;
    }
    
    .logo{
      max-width:150px;
      height:auto;
      display:block;
    }

    .fecha{
      text-align:right;
      white-space:nowrap;
      font-size:8.64pt;
      color:#555;
      letter-spacing:.2px;
      font-style: italic;
      margin-bottom:10px;
    }

    .titulo{
      text-align:center;
      margin:50px 0 26px;
      padding:10px 14px;
      font-weight:400;
      font-size:15pt;
    
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
    }

    .saludo{
      margin:10px 0 18px;
      font-weight:700;
      font-size:10.5pt;
    }

    .cuerpo{
      font-size:9.75pt;
    }

    .cuerpo p{
      margin:0 0 14px;
      text-align:justify;
    }

    .despedida{
      margin-top:24px;
      font-size:10.5pt;
      text-align:right;
    }

    .firma{
      margin-top: 46px;
      text-align:center;
    }

    .firma-img{
      max-width: 190px;
      height:auto;
      display:block;
      margin: 0 auto 6px;
    }

    .firma-nombre{
      font-weight:700;
      font-size:11.5px;
      margin-top:2px;
    }

    .firma-cargo{
      font-size:11px;
      margin-top:2px;
    }

    .nota{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 1.2cm;
    
      width: 100%;
      box-sizing: border-box;
    
      background: #f2f2f2;
      border-top: 1px solid #cfcfcf;
      border-bottom: 1px solid #cfcfcf;
    
      padding: 10px calc(2cm + 12px);
    }

    .nota small{
      display:block;
      margin:0;
      padding:0;
      border:0 !important;
      background:transparent !important;
      color:#333;
      font-size:8.25pt;
      line-height:1.4;
      text-align:justify;
    }

    .app-bar{
      max-width:780px;
      margin:40px auto 0;
      padding:0 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .brand{
      font-weight:800;
      letter-spacing:.2px;
      color:#111;
    }

    .panel{
      max-width:780px;
      margin:12px auto 0;
      background:#fff;
      border-radius:10px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      padding:20px 18px;
    }

    .tabs-cartas{
      display:flex;
      gap:10px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .tab-carta{
      border:1px solid #ddd;
      background:#f3f3f3;
      color:#222;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .tab-carta.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      align-items:start;
    }

    @media (max-width: 760px){
      .grid{ grid-template-columns: 1fr; }
    }

    .field-wrap{
      display:block;
    }

    .field-wrap.hidden-scope{
      display:none !important;
    }

    .field label{
      display:block;
      font-size:12px;
      color:#444;
      margin-bottom:6px;
      font-weight:700;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      box-sizing:border-box;
      border:1px solid #ddd;
      border-radius:8px;
      padding:7px 12px;
      font-size:14px;
      outline:none;
    }

    .field input[readonly]{
      background:#f5f5f5;
      color:#444;
      cursor:not-allowed;
    }

    .field-dias{
      grid-column: span 2;
    }

    .dias-picker{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap:8px;
    }

    .dia-btn{
      border:1px solid #d8d8d8;
      background:#f7f7f7;
      color:#222;
      padding:8px 0;
      border-radius:8px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }

    .dia-btn.activo{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    @media (max-width: 760px){
      .dias-picker{
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

    .mini-label{
      display:block;
      font-size:12px;
      color:#444;
      margin-bottom:6px;
      font-weight:700;
    }

    .creditos-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    @media (max-width: 760px){
      .creditos-grid{ grid-template-columns: 1fr; }
    }

    .creditos-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .creditos-header > label{
      font-size:12px;
      font-weight:700;
      color:#444;
    }

    .creditos-selector{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#555;
    }

    .creditos-selector select{
      width:auto;
      padding:4px 8px;
      font-size:12px;
      border-radius:6px;
    }

    .creditos-header-right{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }
    
    .judicial-inline{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#444;
      font-weight:700;
      margin:0;
    }
    
    .judicial-inline input{
      width:auto !important;
      margin:0;
    }

    .switch-rol{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .switch-rol-btn{
      border:1px solid #d0d0d0;
      background:#f3f3f3;
      color:#222;
      padding:10px 16px;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
    }

    .switch-rol-btn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:14px;
      grid-column:1 / -1;
    }

    button{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:#111;
      color:#fff;
    }

    .btn-ghost{
      background:#eee;
      color:#111;
    }

    .btn-word{
      background:#1976d2; /* azul */
      color:#fff;
    }
    
    .btn-word:hover{
      background:#1565c0;
    }
    
    .btn-pdf{
      background:#e53935; /* rojo */
      color:#fff;
    }
    
    .btn-pdf:hover{
      background:#c62828;
    }

    .hint{
      font-size:12px;
      color:#666;
      margin:10px 0 0;
    }

    .hidden{
      display:none !important;
    }

    /* ===== AMONESTACIÓN ===== */
    .memo-wrap{
      font-size:10.5pt;
      color:#111;
    }

    .memo-codigo{
      text-align:center;
      font-weight:700;
      margin-top:40px;
      margin-bottom:34px;
    }

    .memo-fecha{
      text-align:left;
      margin-top: 100px;
      margin-bottom:26px;
    }

    .memo-meta{
      margin-bottom:22px;
    }

    .memo-meta p{
      margin:0 0 8px;
    }

    .memo-cuerpo p{
      margin:0 0 16px;
      text-align:justify;
      line-height: 1.19;
    }

    .memo-firma{
      text-align:left;
    }

    .firma-linea{
      width:200px;
      border-top:1px solid #222;
      margin:0 0 10px 0;
    }
    .firma-bloque div{
      line-height:1.4;
    }

    .memo-recepcion{
      margin-top:44px;
    }

    .memo-recepcion p{
      margin:0 0 10px;
    }

    .memo-codigo,
    .memo-fecha,
    .memo-meta,
    .memo-recepcion{
      font-family: Tahoma, sans-serif;
      font-size:10pt;
    }

    .memo-cuerpo,
    .memo-cuerpo p,
    .memo-firma,
    .memo-firma div{
      font-family: Calibri, sans-serif;
      font-size:11pt;
    }

    .firma-espacio{
      margin:0;
      line-height:1;
    }
    
    .firma-linea-texto{
      margin:0 0 8px 0;
      line-height:1;
    }

    .field.error input,
    .field.error select,
    .field.error textarea {
      border: 2px solid #e53935 !important;
      background: #fff5f5;
    }
    
    .field.error label {
      color: #e53935;
    }
    
    .field.error::after {
      content: "Campo obligatorio";
      display: block;
      font-size: 11px;
      color: #e53935;
      margin-top: 4px;
    }

    @media print {
      body { background: #fff !important; }
      .app-bar, #panelFormulario { display: none !important; }
      #panelCarta { display: block !important; }
      .hoja {
        margin: 0 !important;
        box-shadow: none !important;
        width: 21.59cm !important;
        min-height: 27.94cm !important;
      }
    }
</style>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>

  <div class="app-bar">
      <div class="brand">QUICK DOC</div>
      <div>
            <button class="btn-ghost" id="btnEditar" type="button">Editar datos</button>
            <button class="btn-word hidden" id="btnWord" type="button">EXPORTAR WORD</button>
            <button class="btn-pdf hidden" id="btnPdf" type="button">EXPORTAR PDF</button>
            <button class="btn-primary hidden" id="btnImprimir" type="button">IMPRIMIR</button>
      </div>
  </div>

  <section class="panel" id="panelFormulario">
    <div class="tabs-cartas" id="tabsCartas">
        <button class="tab-carta" type="button" data-model="notif">CARTA DE NOTIFICACIÓN</button>
        <button class="tab-carta" type="button" data-model="cdna">CARTA DE NO ADEUDO</button>
        <button class="tab-carta active" type="button" data-model="amonestacion">AMONESTACIÓN</button>
    </div>

    <div class="modelo-form hidden" id="formWrap_notif" data-model="notif">
      <form class="form-carta" data-model="notif">
        <div class="grid">
          <div class="field-wrap" data-scope="all"><div class="field">
      <label for="notif_DOC">N° de documento</label>
      <input id="notif_DOC" type="text" value="" placeholder="Ingresa N° de documento">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="notif_NOMBRE">Nombre completo</label>
      <input id="notif_NOMBRE" type="text" value="" placeholder="Ingresa Nombre completo">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="notif_DIRECCION">Dirección</label>
          <textarea id="notif_DIRECCION" rows="3" placeholder="Ingresa Dirección"></textarea>
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="notif_FECHA_CASTIGO">Fecha de cesión / castigo</label>
          <input id="notif_FECHA_CASTIGO" type="date" value="">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="notif_ENTIDAD">Entidad</label>
          <select id="notif_ENTIDAD">
            <option value="">Selecciona una entidad...</option>
<option value="Caja Municipal de Ahorro y Crédito de Arequipa S.A.">Caja Municipal de Ahorro y Crédito de Arequipa S.A.</option>
<option value="Caja Municipal de Ahorro y Crédito de Trujillo S.A.">Caja Municipal de Ahorro y Crédito de Trujillo S.A.</option>
<option value="Banco de la Nación">Banco de la Nación</option>
<option value="Banco BBVA Perú">Banco BBVA Perú</option>
<option value="Financiera Credinka S.A.">Financiera Credinka S.A.</option>
<option value="Caja Rural de Ahorro y Crédito del Centro S.A.">Caja Rural de Ahorro y Crédito del Centro S.A.</option>
<option value="Banco Internacional del Perú S.A.A. – Interbank">Banco Internacional del Perú S.A.A. – Interbank</option>
<option value="Caja Rural de Ahorro y Crédito Los Andes S.A.">Caja Rural de Ahorro y Crédito Los Andes S.A.</option>
<option value="Mibanco – Banco de la Microempresa S.A.">Mibanco – Banco de la Microempresa S.A.</option>
<option value="Financiera ProEmpresa S.A.">Financiera ProEmpresa S.A.</option>
<option value="Financiera Qaqap S.A.C.">Financiera Qaqap S.A.C.</option>
<option value="Caja Municipal de Ahorro y Crédito de Sullana S.A.">Caja Municipal de Ahorro y Crédito de Sullana S.A.</option>
<option value="Banco Scotiabank Perú S.A.A.">Banco Scotiabank Perú S.A.A.</option>
          </select>
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="notif_CUENTAENTIDAD">Cuenta entidad</label>
      <input id="notif_CUENTAENTIDAD" type="text" value="" placeholder="Ingresa Cuenta entidad">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field field-creditos">
          <div class="creditos-header">
            <label>Créditos</label>
    
            <div class="creditos-header-right">
              <div class="creditos-selector">
                <span>Cantidad</span>
                <select id="notif_CREDITOS_COUNT" data-model="notif">
                  <option value="1" selected>1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
              </div>
    
              
            </div>
          </div>
    
          <div class="creditos-grid" id="notif_CREDITOS_CONTAINER">
            <input id="notif_CREDITOS_1" type="text" placeholder="Crédito 1">
            <input id="notif_CREDITOS_2" type="text" placeholder="Crédito 2">
            <input id="notif_CREDITOS_3" type="text" placeholder="Crédito 3">
            <input id="notif_CREDITOS_4" type="text" placeholder="Crédito 4">
            <input id="notif_CREDITOS_5" type="text" placeholder="Crédito 5">
          </div>
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="notif_DT">Deuda total</label>
      <input id="notif_DT" type="text" value="" placeholder="Ingresa Deuda total">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="notif_MAILSUPER">Correo supervisor</label>
      <input id="notif_MAILSUPER" type="text" value="" placeholder="Ingresa Correo supervisor">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="notif_LOGO_ENTIDAD">LOGO_ENTIDAD</label>
      <input id="notif_LOGO_ENTIDAD" type="text" value="" placeholder="Ingresa LOGO_ENTIDAD">
    </div></div>
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit">GENERAR CARTA</button>
        </div>

        <p class="hint">Completa los campos y presiona <b>GENERAR CARTA</b> para ver la carta.</p>
      </form>
    </div>

<div class="modelo-form hidden" id="formWrap_cdna" data-model="cdna">
      <form class="form-carta" data-model="cdna">
        <div class="grid">
          <div class="field-wrap" data-scope="all">
      <div class="field">
        <label class="mini-label">Tipo de documento</label>
        <div class="switch-rol" id="cdna_switch_doc">
          <button type="button" class="switch-rol-btn active" data-value="DNI" id="btnDocDni">
            DNI
          </button>
          <button type="button" class="switch-rol-btn" data-value="RUC" id="btnDocRuc">
            RUC
          </button>
        </div>
        <input id="cdna_TIPO_DOC" type="hidden" value="DNI">
      </div>
    </div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="cdna_DOC">N° de documento</label>
      <input id="cdna_DOC" type="text" value="" placeholder="Ingresa N° de documento">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
      <label for="cdna_NOMBRE">Nombre completo</label>
      <input id="cdna_NOMBRE" type="text" value="" placeholder="Ingresa Nombre completo">
    </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="cdna_FECHA_PAGO">Fecha de pago</label>
          <input id="cdna_FECHA_PAGO" type="date" value="">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="cdna_ENTIDAD">Entidad (banco / empresa)</label>
          <select id="cdna_ENTIDAD">
            <option value="">Selecciona una entidad...</option>
<option value="Caja Municipal de Ahorro y Crédito de Arequipa S.A.">Caja Municipal de Ahorro y Crédito de Arequipa S.A.</option>
<option value="Caja Municipal de Ahorro y Crédito de Trujillo S.A.">Caja Municipal de Ahorro y Crédito de Trujillo S.A.</option>
<option value="Banco de la Nación">Banco de la Nación</option>
<option value="Banco BBVA Perú">Banco BBVA Perú</option>
<option value="Financiera Credinka S.A.">Financiera Credinka S.A.</option>
<option value="Caja Rural de Ahorro y Crédito del Centro S.A.">Caja Rural de Ahorro y Crédito del Centro S.A.</option>
<option value="Banco Internacional del Perú S.A.A. – Interbank">Banco Internacional del Perú S.A.A. – Interbank</option>
<option value="Caja Rural de Ahorro y Crédito Los Andes S.A.">Caja Rural de Ahorro y Crédito Los Andes S.A.</option>
<option value="Mibanco – Banco de la Microempresa S.A.">Mibanco – Banco de la Microempresa S.A.</option>
<option value="Financiera ProEmpresa S.A.">Financiera ProEmpresa S.A.</option>
<option value="Financiera Qaqap S.A.C.">Financiera Qaqap S.A.C.</option>
<option value="Caja Municipal de Ahorro y Crédito de Sullana S.A.">Caja Municipal de Ahorro y Crédito de Sullana S.A.</option>
<option value="Banco Scotiabank Perú S.A.A.">Banco Scotiabank Perú S.A.A.</option>
          </select>
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field">
          <label for="cdna_FECHA_CASTIGO">Fecha de cesión / castigo</label>
          <input id="cdna_FECHA_CASTIGO" type="date" value="">
        </div></div>
<div class="field-wrap" data-scope="all"><div class="field field-creditos">
          <div class="creditos-header">
            <label>Créditos</label>
    
            <div class="creditos-header-right">
              <div class="creditos-selector">
                <span>Cantidad</span>
                <select id="cdna_CREDITOS_COUNT" data-model="cdna">
                  <option value="1" selected>1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
              </div>
    
              
                <label class="judicial-inline">
                  <input id="cdna_JUDICIAL" type="checkbox" />
                  <span>Judicial</span>
                </label>
                
            </div>
          </div>
    
          <div class="creditos-grid" id="cdna_CREDITOS_CONTAINER">
            <input id="cdna_CREDITOS_1" type="text" placeholder="Crédito 1">
            <input id="cdna_CREDITOS_2" type="text" placeholder="Crédito 2">
            <input id="cdna_CREDITOS_3" type="text" placeholder="Crédito 3">
            <input id="cdna_CREDITOS_4" type="text" placeholder="Crédito 4">
            <input id="cdna_CREDITOS_5" type="text" placeholder="Crédito 5">
          </div>
        </div></div>
<div class="field-wrap hidden" data-scope="all" id="cdna_EXPEDIENTES_WRAP">
      <div class="field field-creditos">
        <div class="creditos-header">
          <label>N° de expediente</label>
        </div>
        <div class="creditos-grid" id="cdna_EXPEDIENTES_CONTAINER">
          <input id="cdna_EXPEDIENTE_1" type="text" placeholder="Expediente 1">
          <input id="cdna_EXPEDIENTE_2" type="text" placeholder="Expediente 2">
          <input id="cdna_EXPEDIENTE_3" type="text" placeholder="Expediente 3">
          <input id="cdna_EXPEDIENTE_4" type="text" placeholder="Expediente 4">
          <input id="cdna_EXPEDIENTE_5" type="text" placeholder="Expediente 5">
        </div>
      </div>
    </div>
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit">GENERAR CARTA</button>
        </div>

        <p class="hint">Completa los campos y presiona <b>GENERAR CARTA</b> para ver la carta.</p>
      </form>
    </div>

<div class="modelo-form" id="formWrap_amonestacion" data-model="amonestacion">
      <form class="form-carta" data-model="amonestacion">
        <div class="grid">
          <div class="field-wrap" data-scope="all">
          <div class="field">

    <section class="cuerpo">
      <p>
        Nos ponemos en contacto con Usted para informarle que el pasado {{FECHA_CASTIGO}} su obligación con el {{ENTIDAD}} fue cedida incondicional e irrevocablemente a Expértis Master Servicer & Collections S.A.C., en virtud a lo dispuesto por el Art. 1206° del Código Civil, norma que precisa lo siguiente: “La Cesión es el Acto de disposición en virtud del cual el cedente ({{ENTIDAD}}) transmite al cesionario (Expértis Master Servicer & Collections S.A.C.) el derecho de exigir la prestación a cargo de su deudor , que se ha obligado a transferir por un título distinto. La cesión puede hacerse aún sin asentimiento del deudor”.
      </p>
      <p>
        Como consecuencia de ello, {{singular}}el pago referente a{{/singular}}{{plural}}los pagos referentes a{{/plural}} {{DETALLE_CREDITOS}}, cuyo monto total a la fecha asciende a S/. {{DT}}* deberán ser cancelados mediante transferencia bancaria o depósito en las cuentas abiertas en el {{ENTIDAD}} con número {{CUENTAENTIDAD}} o en el Banco de Crédito BCP con número de cuenta 193-2270088-0-80, ambas a nombre de Expértis Master Servicer & Collections S.A.C.
      </p>
      <p>
        Expértis Master Servicer & Collections S.A.C. le invita a ponerse en contacto con sus especialistas para tener una asesoría especializada y obtener descuentos de cancelación o cronogramas de pagos acorde a su situación económica**, a través de los siguientes medios:
      </p>
      <p>
        •	Central Telefónica: 938 835 118/ (01) 743-1590 opción 1<br>
        •	Correo electrónico: {{MAILSUPER}}<br>
      </p>
      <p>Atentamente,</p>
    </section>

    <section class="memo-cuerpo">
      <p>
        {{asesor}}Por medio de la presente nos dirigimos a Ud. para manifestarle nuestra decisión de formularle la Amonestación Escrita por la actitud asumida por su persona al haber incurrido en <strong>{{cantidad}} {{tipo}}</strong> ({{dias}} del presente mes).{{/asesor}}
        {{supervisor}}A través de la presente, hacemos expreso el llamado de atención severo hacia usted con respecto a la conducta inadecuada que ha presentado durante el mes en curso, habiendo incurrido en {{cantidad}} {{tipo}} siendo el {{calculo}} del mes (correspondiente a los días {{dias}}), las cuales equivalen a {{tiempo}}. Para esto, se le recuerda que su horario de ingreso es hasta las 07:00 a.m.

        Por los hechos dados, se le aplica una amonestación escrita y le invocamos a recapacitar sobre su actitud con el fin de mantener un buen desempeño de sus funciones dentro de la empresa. {{/supervisor}}
      </p>

      <p>
        Sirva la presente como un precedente en caso de que las conductas negativas continúen y afecten la productividad laboral de la empresa. Si fuese este el escenario, se iniciará un procedimiento laboral para sancionarle. Nuestra decisión se encuentra debidamente sustentada en el artículo 9 del Decreto Supremo 003-97-TR Ley de Productividad y Competitividad Laboral.
      </p>

      <p>
        Copia de esta comunicación va a su archivo personal para los efectos legales pertinentes.
      </p>

      <p>Atentamente,</p>

  const ACCESS_STATE = {
    cdna_unlocked: false
  };
  let activeModel = 'amonestacion';

  const panelFormulario = document.getElementById('panelFormulario');
  const panelCarta = document.getElementById('panelCarta');
  const renderCarta = document.getElementById('renderCarta');
  const btnEditar = document.getElementById('btnEditar');
  const btnWord = document.getElementById('btnWord');
  const btnPdf = document.getElementById('btnPdf');
  const btnImprimir = document.getElementById('btnImprimir');
  const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Setiembre','Octubre','Noviembre','Diciembre'];

  function solicitarAccesoCDNA() {
    if (ACCESS_STATE.cdna_unlocked) {
      switchModel('cdna');
      return;
    }

    const claveEsperada = (PASSWORDS['CARTA_CDNA'] || '').trim();
    if (!claveEsperada) {
      alert('No se encontró una clave configurada para CARTA_CDNA.');
      return;
    }

    const ingresada = window.prompt('Ingrese la clave para acceder a CARTA DE NO ADEUDO:');
    if (ingresada === null) return;

    if (String(ingresada).trim() === claveEsperada) {
      ACCESS_STATE.cdna_unlocked = true;
      switchModel('cdna');
    } else {
      alert('Clave incorrecta.');
    }
  }

  function getFieldId(modelId, key) {
    return `${modelId}_${key}`;
  }

  function getTodayLongEs() {
    const d = new Date();
    return `${d.getDate()} de ${MONTHS_ES[d.getMonth()]} de ${d.getFullYear()}`;
  }

  function getAmonestacionCatalogByRol() {
    const rol = (document.getElementById('amonestacion_rol_destinatario')?.value || 'asesor').trim();
    return rol === 'supervisor'
      ? (CATALOGO_AMONESTACION.supervisor || [])
      : (CATALOGO_AMONESTACION.asesor || []);
  }

  function syncAmonestadoOptionsByRol() {
    const sel = document.getElementById('amonestacion_amonestado');
    const dni = document.getElementById('amonestacion_dni');
    const superInp = document.getElementById('amonestacion_super');
    if (!sel) return;

    const catalogo = getAmonestacionCatalogByRol();
    const valorActual = sel.value || '';

    sel.innerHTML = '<option value="">Selecciona...</option>' +
      catalogo.map(p => `<option value="${p.nombre}">${p.nombre}</option>`).join('');

    const existeActual = catalogo.some(p => p.nombre === valorActual);
    sel.value = existeActual ? valorActual : '';

    if (!existeActual) {
      if (dni) dni.value = '';
      if (superInp) superInp.value = '';
    }

    syncDatosAmonestacionDesdeSeleccion();
  }

  function syncCdnaExpedientesInputs() {
      const chkJudicial = document.getElementById('cdna_JUDICIAL');
      const wrap = document.getElementById('cdna_EXPEDIENTES_WRAP');
      const creditosCount = document.getElementById('cdna_CREDITOS_COUNT');
    
      if (!wrap || !creditosCount) return;
    
      const judicialActivo = !!chkJudicial?.checked;
      const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
    
      wrap.classList.toggle('hidden', !judicialActivo);
    
      for (let i = 1; i <= 5; i++) {
        const inp = document.getElementById(`cdna_EXPEDIENTE_${i}`);
        if (!inp) continue;
    
        const visible = judicialActivo && i <= n;
        inp.classList.toggle('hidden', !visible);
    
        if (!visible) inp.value = '';
      }
  }

  function syncDatosAmonestacionDesdeSeleccion() {
    const sel = document.getElementById('amonestacion_amonestado');
    const dni = document.getElementById('amonestacion_dni');
    const superInp = document.getElementById('amonestacion_super');
    if (!sel) return;

    const nombre = (sel.value || '').trim();
    const catalogo = getAmonestacionCatalogByRol();
    const persona = catalogo.find(p => p.nombre === nombre);

    if (!persona) {
      if (dni) dni.value = '';
      if (superInp) superInp.value = '';
      return;
    }

    if (dni) dni.value = persona.dni || '';
    if (superInp) superInp.value = persona.supervisor || '';
  }

  function syncDiasButtonsFromInput() {
    const input = document.getElementById('amonestacion_dias');
    if (!input) return;

    const seleccionados = new Set(
      (input.value || '')
        .split(',')
        .map(v => v.trim())

    const total = (diasInput.value || '')
      .split(',')
      .map(v => v.trim())

  function getTipoTextoFinal() {
    const tipoBase = (document.getElementById('amonestacion_tipo')?.value || '').trim().toUpperCase();
    const cantidad = Number(document.getElementById('amonestacion_cantidad')?.value || 0);

    if (!tipoBase) return '';

    if (tipoBase === 'TARDANZA') {
      return cantidad === 1 ? 'TARDANZA INJUSTIFICADA' : 'TARDANZAS INJUSTIFICADAS';
    }

    if (tipoBase === 'FALTA') {
      return cantidad === 1 ? 'FALTA INJUSTIFICADA' : 'FALTAS INJUSTIFICADAS';
    }

    return tipoBase;
  }

  function toggleDiaSeleccion(value) {
    const input = document.getElementById('amonestacion_dias');
    if (!input) return;

    let valores = (input.value || '')
      .split(',')
      .map(v => v.trim())
      .filter(Boolean);

    if (valores.includes(value)) {
      valores = valores.filter(v => v !== value);
    } else {
      valores.push(value);
    }

    valores = [...new Set(valores)].sort((a, b) => Number(a) - Number(b));
    input.value = valores.join(', ');
    syncDiasButtonsFromInput();
    syncCantidadDesdeDias();
  }

  function syncCreditosInputs() {
      if (!['cdna', 'notif'].includes(activeModel)) return;
    
      const creditosCount = document.getElementById('cdna_CREDITOS_COUNT');
      const creditosContainer = document.getElementById('cdna_CREDITOS_CONTAINER');
      if (!creditosCount || !creditosContainer) return;
    
      const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
      for (let i = 1; i <= 5; i++) {
        const inp = document.getElementById(`cdna_CREDITOS_${i}`);

  function buildCreditosString() {
    const creditosCount = document.getElementById(`${activeModel}_CREDITOS_COUNT`);
    if (!creditosCount) return '';

    const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
    const vals = [];

    for (let i = 1; i <= n; i++) {
      const v = (document.getElementById(`${activeModel}_CREDITOS_${i}`)?.value || '').trim();
      if (v) vals.push(v);
    }

    return vals.join(', ');
  }

  function buildDetalleCreditos() {
      const creditosCount = document.getElementById('cdna_CREDITOS_COUNT');
      const judicialActivo = !!document.getElementById('cdna_JUDICIAL')?.checked;
    
      if (!creditosCount) return '';
    
      const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
      const detalles = [];
    
      for (let i = 1; i <= n; i++) {
        const credito = (document.getElementById(`cdna_CREDITOS_${i}`)?.value || '').trim();
        const expediente = (document.getElementById(`cdna_EXPEDIENTE_${i}`)?.value || '').trim();
    
        if (!credito) continue;
    
        if (judicialActivo) {
          detalles.push(`el crédito N.° ${credito}, anexado al expediente N.° ${expediente}`);
        } else {
          detalles.push(`el crédito N.° ${credito}`);
        }
      }
    
      if (!detalles.length) return '';
    
      if (detalles.length === 1) return detalles[0];
      if (detalles.length === 2) return `${detalles[0]} y ${detalles[1]}`;
    
      return `${detalles.slice(0, -1).join(', ')}, y ${detalles[detalles.length - 1]}`;
  }

    function buildDetalleCreditosNotif() {
      const creditosCount = document.getElementById('notif_CREDITOS_COUNT');
      if (!creditosCount) return '';
    
      const n = Math.max(1, Math.min(5, Number(creditosCount.value || 1)));
      const creditos = [];
    
      for (let i = 1; i <= n; i++) {
        const credito = (document.getElementById(`notif_CREDITOS_${i}`)?.value || '').trim();
        if (credito) creditos.push(`el crédito N.° ${credito}`);
      }
    
      if (!creditos.length) return '';
      if (creditos.length === 1) return creditos[0];
      if (creditos.length === 2) return `${creditos[0]} y ${creditos[1]}`;
    
      return `${creditos.slice(0, -1).join(', ')}, y ${creditos[creditos.length - 1]}`;
    }

  function applySingularPluralByCreditos(text) {
    const n = Number(document.getElementById('cdna_CREDITOS_COUNT')?.value || 1);
    const isSingular = (n === 1);
    const reSing = /\{\{\s*singular\s*\}\}([\s\S]*?)\{\{\s*\/singular\s*\}\}/gi;
    const rePlur = /\{\{\s*plural\s*\}\}([\s\S]*?)\{\{\s*\/plural\s*\}\}/gi;

    if (isSingular) {
      text = text.replace(reSing, '$1');
      text = text.replace(rePlur, '');
    } else {
      text = text.replace(rePlur, '$1');
      text = text.replace(reSing, '');
    }

    return text;
  }

  function applyJudicialBlock(text) {
    const on = !!document.getElementById('cdna_JUDICIAL')?.checked;
    const reJud = /\{\{\s*judicial\s*\}\}([\s\S]*?)\{\{\s*\/judicial\s*\}\}/gi;
    return on ? text.replace(reJud, '$1') : text.replace(reJud, '');
  }

  function applyRolBlocks(text) {
    const rol = (document.getElementById('amonestacion_rol_destinatario')?.value || '').trim();
    const reAsesor = /\{\{\s*asesor\s*\}\}([\s\S]*?)\{\{\s*\/asesor\s*\}\}/gi;
    const reSupervisor = /\{\{\s*supervisor\s*\}\}([\s\S]*?)\{\{\s*\/supervisor\s*\}\}/gi;

    if (rol === 'asesor') {
      text = text.replace(reAsesor, '$1');
      text = text.replace(reSupervisor, '');
    } else if (rol === 'supervisor') {
      text = text.replace(reSupervisor, '$1');
      text = text.replace(reAsesor, '');
    } else {
      text = text.replace(reSupervisor, '');
      text = text.replace(reAsesor, '');
    }

    return text;
  }

  function applyTemplate(templateStr, data) {
    return templateStr.replace(/\{\{\s*([A-Za-z0-9_]+)\s*\}\}/g, (match, key) => {
      const v = data[key];
      return (v === undefined || v === null || v === '') ? match : String(v);
    });
  }

  function isoToLongEs(iso) {
    if (!iso) return '';
    const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return '';
    const yyyy = Number(m[1]);
    const mm = Number(m[2]);
    const dd = Number(m[3]);
    if (!yyyy || mm < 1 || mm > 12 || dd < 1 || dd > 31) return '';
    return `${dd} de ${MONTHS_ES[mm - 1]} de ${yyyy}`;
  }

  function calcularPorcentajeMesActual() {
      const cantidad = Number(document.getElementById('amonestacion_cantidad')?.value || 0);
    
      const hoy = new Date();
      const año = hoy.getFullYear();
      const mes = hoy.getMonth(); // 0-11
    
      const diasDelMes = new Date(año, mes + 1, 0).getDate();
    
      if (!cantidad || !diasDelMes) return '';
    
      const porcentaje = (cantidad / diasDelMes) * 100;
      return `${porcentaje.toFixed(2)}%`;
  }

  function collectData(modelId) {
      const cfg = MODELOS[modelId];
      const data = {};
    
      for (const key of cfg.placeholders) {
        if (modelId === 'cdna' && key === 'CREDITOS') {
          data[key] = buildCreditosString();
          continue;
        }
    
        if (modelId === 'amonestacion' && key === 'tipo') {
          data[key] = getTipoTextoFinal();
          continue;
        }
    
        const el = document.getElementById(getFieldId(modelId, key));
        if (!el) continue;
    
        let v = (el.value || '').trim();
    
        if (cfg.date_keys.includes(key)) {
          v = isoToLongEs(v);
        }
    
        data[key] = v;
      }

        if (modelId === 'notif') {
          data.CREDITOS = buildCreditosString();
          data.DETALLE_CREDITOS = buildDetalleCreditosNotif();
        
          const entidad = data.ENTIDAD || '';
        
          if (LOGOS_ENTIDADES[entidad]) {
            data.LOGO_ENTIDAD =
              `<img class="logo-entidad" src="${LOGOS_ENTIDADES[entidad]}" alt="${entidad}">`;
          } else {
            data.LOGO_ENTIDAD = '';
          }
        }

      if (modelId === 'cdna') {
        data.TIPO_DOC = (document.getElementById('cdna_TIPO_DOC')?.value || 'DNI').trim();
        data.DOC = (document.getElementById('cdna_DOC')?.value || '').trim();
        data.FECHA_HOY = getTodayLongEs();
        data.DETALLE_CREDITOS = buildDetalleCreditos();
      }
    
      if (modelId === 'amonestacion') {
        const rol = (document.getElementById('amonestacion_rol_destinatario')?.value || 'asesor').trim();
    
        data.rol_destinatario = rol;
        data.ciudad = 'Lima';
        data.fecha_documento = getTodayLongEs();
        data.dni = (document.getElementById('amonestacion_dni')?.value || '').trim();
        data.super = (document.getElementById('amonestacion_super')?.value || '').trim();
        data.calculo = calcularPorcentajeMesActual();
    
        if (rol === 'asesor') {
          data.cargo_amonestado = 'Asesor de cobranza telefónica';
        } else if (rol === 'supervisor') {
          data.cargo_amonestado = 'Supervisor de cobranza telefónica';
        }
      }
    
      return data;
  }

  async function imageToBase64(img) {
      const src = img.getAttribute('src');
      if (!src) return null;
    
      if (src.startsWith('data:')) {
        return src;
      }
    
      return null;
  }
    
  async function clonarCartaConImagenesEmbebidas() {
      const original = document.querySelector('#renderCarta .hoja');
      if (!original) {
        throw new Error('No hay carta renderizada para exportar.');
      }
    
      const clon = original.cloneNode(true);
      const imgsOriginal = original.querySelectorAll('img');
      const imgsClon = clon.querySelectorAll('img');
    
      for (let i = 0; i < imgsOriginal.length; i++) {
        const base64 = await imageToBase64(imgsOriginal[i]);
    
        if (imgsClon[i]) {
          if (base64) {
            imgsClon[i].setAttribute('src', base64);
          } else {
            console.warn('⚠️ Se eliminará imagen porque no pudo convertirse:', imgsOriginal[i].getAttribute('src'));
            imgsClon[i].remove();
            continue;
          }
    
          if (imgsClon[i].classList.contains('logo')) {
            imgsClon[i].setAttribute('width', '140');
            imgsClon[i].removeAttribute('height');
            imgsClon[i].style.width = '140px';
            imgsClon[i].style.height = 'auto';
            imgsClon[i].style.display = 'block';
          }
    
          if (imgsClon[i].classList.contains('firma-img')) {
            imgsClon[i].setAttribute('width', '180');
            imgsClon[i].removeAttribute('height');
            imgsClon[i].style.width = '180px';
            imgsClon[i].style.height = 'auto';
            imgsClon[i].style.display = 'block';
          }
        }
      }
    
      return clon;
  }

  function descargarArchivo(nombre, contenido, mimeType) {
    const blob = new Blob(['﻿', contenido], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = nombre;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function buildNombreBaseDocumento() {
      const fecha = new Date();
      const año = fecha.getFullYear();
    
      if (activeModel === 'amonestacion') {
        const code = (document.getElementById('amonestacion_code')?.value || 'SIN-CODIGO').trim();
        const amonestado = (document.getElementById('amonestacion_amonestado')?.value || 'SIN-NOMBRE').trim();
    
        // 🔹 detectar tipo base (no el texto final largo)
        const tipoBase = (document.getElementById('amonestacion_tipo')?.value || '').trim().toUpperCase();
    
        let sigla = 'FT'; // default
    
        if (tipoBase === 'FALTA') {
          sigla = 'FI';
        } else if (tipoBase === 'TARDANZA') {
          sigla = 'FT';
        }
    
        return `${code}-${año} .Memorando Escrito ${sigla} ${amonestado}`;
      }

        if (activeModel === 'CAMP') {
          const nombre = (document.getElementById('CAMP_NOMBRE')?.value || 'DOCUMENTO')
            .trim()
            .replace(/[\/:*?"<>|]+/g, '');
        
          const doc = (document.getElementById('CAMP_DOC')?.value || 'SIN-DOC').trim();
        
          return `CARTA-DE-CAMPAÑA_${doc}_${nombre}_${año}`;
        }


        if (activeModel === 'notif') {
          const nombre = (document.getElementById('notif_NOMBRE')?.value || 'DOCUMENTO')
            .trim()
            .replace(/[\/:*?"<>|]+/g, '');
        
          const doc = (document.getElementById('notif_DOC')?.value || 'SIN-DOC').trim();
        
          return `CARTA-DE-NOTIFICACION_${doc}_${nombre}_${año}`;
        }

      if (activeModel === 'cdna') {
        const nombre = (document.getElementById('cdna_NOMBRE')?.value || 'DOCUMENTO')
          .trim()
          .replace(/[\\/:*?"<>|]+/g, '');
    
        return `CDNA_${nombre}_${año}`;
      }
    
      return `documento_${año}`;
  }

        const clon = await clonarCartaConImagenesEmbebidas();
    
        const contenedor = document.createElement('div');
        contenedor.style.position = 'fixed';
        contenedor.style.left = '-99999px';
        contenedor.style.top = '0';
        contenedor.style.zIndex = '-1';
        contenedor.style.background = '#ffffff';
        contenedor.style.padding = '0';
        contenedor.style.margin = '0';
    
        clon.style.margin = '0';
        clon.style.boxShadow = 'none';
        clon.style.borderRadius = '0';
        clon.style.background = '#ffffff';
    
        contenedor.appendChild(clon);
        document.body.appendChild(contenedor);
    
        const canvas = await html2canvas(clon, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false
        });
    
        document.body.removeChild(contenedor);
    
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
    
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'p',
          unit: 'mm',
          format: 'letter'
        });
    
        const pdfWidth = 215.9;
        const pdfHeight = 279.4;
    
        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
        pdf.save(buildPdfFileName());
    
      } catch (err) {
        console.error(err);
        alert('No se pudo exportar el documento a PDF.');
      }
  }

  document.querySelectorAll('.tab-carta').forEach(btn => {
      btn.addEventListener('click', () => {
        const modelId = btn.dataset.model;
    
        if (modelId === 'cdna') {
          solicitarAccesoCDNA();
          return;
        }
    
        switchModel(modelId);
      });
  });

  document.getElementById('btnRolAsesor')?.addEventListener('click', () => {
    setRolDestinatario('asesor');
  });

  document.getElementById('btnRolSupervisor')?.addEventListener('click', () => {
    setRolDestinatario('supervisor');
  });

  document.getElementById('btnDocDni')?.addEventListener('click', () => {
    setCdnaTipoDoc('DNI');
  });

  document.getElementById('btnDocRuc')?.addEventListener('click', () => {
    setCdnaTipoDoc('RUC');
  });

  btnEditar?.addEventListener('click', showForm);

  document.addEventListener('click', (e) => {
    if (e.target?.classList.contains('dia-btn')) {
      toggleDiaSeleccion(e.target.dataset.value);
    }
  });

  document.addEventListener('change', (e) => {
    if (e.target?.id === 'cdna_CREDITOS_COUNT') syncCreditosInputs();
    if (e.target?.id === 'cdna_JUDICIAL') syncCdnaJudicialUI();
    if (e.target?.id === 'amonestacion_amonestado') syncDatosAmonestacionDesdeSeleccion();
  });

  document.addEventListener('input', (e) => {
      if (
        e.target.id === 'amonestacion_code' ||
        e.target.id === 'amonestacion_dias'
      ) {
        const field = e.target.closest('.field');
        if (field) field.classList.remove('error');
      }
  });
    
  document.addEventListener('change', (e) => {
      if (
        e.target.id === 'amonestacion_amonestado' ||
        e.target.id === 'amonestacion_tipo'
      ) {
        const field = e.target.closest('.field');
        if (field) field.classList.remove('error');
      }
  });

  document.querySelectorAll('.form-carta').forEach(form => {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
    
        const modelId = form.dataset.model;
    
        if (modelId === 'amonestacion') {
        
          const requeridos = [
            { id: 'amonestacion_code' },
            { id: 'amonestacion_amonestado' },
            { id: 'amonestacion_tipo' },
            { id: 'amonestacion_dias' },
          ];
        
          let hayErrores = false;
        
          // limpiar errores previos
          form.querySelectorAll('.field.error').forEach(el => {
            el.classList.remove('error');
          });
        
          requeridos.forEach(campo => {
            const el = document.getElementById(campo.id);
            const valor = (el?.value || '').trim();
        
            if (!valor) {
              hayErrores = true;
        
              const field = el.closest('.field');
              if (field) {
                field.classList.add('error');
              }
            }
          });
        
          if (hayErrores) {
            return; // ❌ NO genera la carta
          }
        }

        if (modelId === 'cdna') {
          const judicialActivo = !!document.getElementById('cdna_JUDICIAL')?.checked;
          const n = Math.max(1, Math.min(5, Number(document.getElementById('cdna_CREDITOS_COUNT')?.value || 1)));
        
          if (judicialActivo) {
            for (let i = 1; i <= n; i++) {
              const credito = (document.getElementById(`cdna_CREDITOS_${i}`)?.value || '').trim();
              const expediente = (document.getElementById(`cdna_EXPEDIENTE_${i}`)?.value || '').trim();
        
              if (credito && !expediente) {
                alert(`Falta completar el expediente ${i}.`);
                return;
              }
            }
          }
        }

        const data = collectData(modelId);
    
        if (modelId === 'cdna' && ('FECHA_HOY' in data) && !data.FECHA_HOY) {
          const d = new Date();
          const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          data.FECHA_HOY = isoToLongEs(iso);
        }
    
        const tplRaw = document.getElementById(`tplCarta_${modelId}`).innerHTML;
        let tplFixed = tplRaw;
    
        if (modelId === 'cdna') {
          tplFixed = applySingularPluralByCreditos(tplFixed);
          tplFixed = applyJudicialBlock(tplFixed);
        }
        
        if (modelId === 'notif') {
          tplFixed = applySingularPluralByCreditos(tplFixed);
        }
            
        if (modelId === 'amonestacion') {
          tplFixed = applyRolBlocks(tplFixed);
        }
    
        renderCarta.innerHTML = applyTemplate(tplFixed, data);
        showCarta();
      });
  });

  btnWord?.addEventListener('click', async () => {
      await exportarWord();
  });

  btnPdf?.addEventListener('click', async () => {
      await exportarPDF();
  });

  btnImprimir?.addEventListener('click', () => {
    window.print();
  });

    setRolDestinatario('asesor');
    setCdnaTipoDoc('DNI');
    syncAmonestadoOptionsByRol();
    syncDiasButtonsFromInput();
    syncCantidadDesdeDias();
    switchModel('amonestacion');
</script>

</body>
</html>
